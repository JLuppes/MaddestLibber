{%extends 'base.html'%} {% block content %}
<div class="titleBox">
  <div class="titleCard">
    <h4>Story: {{storyName}}</h4>
    <h4>Description: {{storyDescription}}</h4>
  </div>
</div>

<form action="" method="POST">
  <ul>
    {% for i, thisRequest in enumerate(blanks) %}
    <li>
      <label for="response-{{i}}">{{thisRequest.name}}</label>

      <p>{% if thisRequest.hint %}Hint: {{thisRequest.hint}}{% endif %}</p>

      <input name="response-{{i}}" id="response-{{i}}" type="text" />
    </li>
    <br />
    {% endfor %}
  </ul>

  <input type="submit" value="Submit Responses" />
</form>

{%endblock%}
