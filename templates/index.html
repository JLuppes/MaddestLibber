{%extends 'base.html'%}

{%block title%}{{super()}} - Home{%endblock%}

{%block content %}
<div
  class="d-flex flex-column flex-md-row p-4 gap-4 py-md-5 align-items-center justify-content-center"
>
  <div class="list-group">
    <a
      href="{{url_for('create.newStory')}}"
      class="list-group-item list-group-item-action d-flex gap-3 py-3"
      aria-current="true"
    >
      📝
      <div class="d-flex gap-2 w-100 justify-content-between">
        <div>
          <h6 class="mb-0">New Story</h6>
          <p class="mb-0 opacity-75">
            Create a new story for others to fill in.
          </p>
        </div>
      </div>
    </a>
    <a
      href="{{url_for('play.listStories')}}"
      class="list-group-item list-group-item-action d-flex gap-3 py-3"
      aria-current="true"
    >
      📜
      <div class="d-flex gap-2 w-100 justify-content-between">
        <div>
          <h6 class="mb-0">List Stories</h6>
          <p class="mb-0 opacity-75">
            View the list of stories that have been written.
          </p>
        </div>
      </div>
    </a>
    <a
      href="{{url_for('play.randomStory')}}"
      class="list-group-item list-group-item-action d-flex gap-3 py-3"
      aria-current="true"
    >
      💫
      <div class="d-flex gap-2 w-100 justify-content-between">
        <div>
          <h6 class="mb-0">Random Story</h6>
          <p class="mb-0 opacity-75">
            Get a random story to fill in!
          </p>
        </div>
      </div>
    </a>
  </div>
</div>
{%endblock%}
